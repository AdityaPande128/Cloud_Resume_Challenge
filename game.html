<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Aditya's Universe</title>
    <meta name="description" content="Fly a rocket ship through 3D space to explore Aditya Pande's portfolio.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="game.css">
</head>
<body>
    <div id="hud">
        <div id="hud-top-left">
            <a href="index.html" id="back-link">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                Normal View
            </a>
        </div>
        <div id="hud-top-right">
            <div id="explored-counter">Explored: <span id="explored-count">0</span> / 7</div>
        </div>
        <div id="hud-bottom">
            <div id="controls-hint">
                <span class="key">W</span><span class="key">A</span><span class="key">S</span><span class="key">D</span> or Arrow Keys to fly
                <span class="separator">|</span>
                <span class="key">SPACE</span> to land on planets
                <span class="separator">|</span>
                <span class="key">ESC</span> to close panels
            </div>
        </div>
    </div>

    <div id="landing-prompt" class="hidden">
        <div class="landing-prompt-inner">
            <span class="key">SPACE</span> to explore
        </div>
    </div>

    <div id="content-overlay" class="hidden">
        <div id="content-panel">
            <button id="close-panel">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </button>
            <div id="content-body"></div>
            <button id="launch-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4.5 16.5c-1.5 1.26-2 5-2 5s3.74-.5 5-2c.71-.84.7-2.13-.09-2.91a2.18 2.18 0 0 0-2.91-.09z"/><path d="m12 15-3-3a22 22 0 0 1 2-3.95A12.88 12.88 0 0 1 22 2c0 2.72-.78 7.5-6 11a22.35 22.35 0 0 1-4 2z"/><path d="M9 12H4s.55-3.03 2-4c1.62-1.08 5 0 5 0"/><path d="M12 15v5s3.03-.55 4-2c1.08-1.62 0-5 0-5"/></svg>
                Launch Back to Space
            </button>
        </div>
    </div>

    <div id="intro-overlay">
        <div id="intro-content">
            <h1>Aditya's Universe</h1>
            <p class="intro-subtitle">Fly through 3D space to explore my portfolio</p>
            <div class="intro-controls">
                <div class="control-row"><span class="key">W</span> / <span class="key">↑</span> Thrust forward</div>
                <div class="control-row"><span class="key">A</span> / <span class="key">←</span> Rotate left</div>
                <div class="control-row"><span class="key">D</span> / <span class="key">→</span> Rotate right</div>
                <div class="control-row"><span class="key">S</span> / <span class="key">↓</span> Brake</div>
                <div class="control-row"><span class="key">SPACE</span> Land on planet</div>
            </div>
            <button id="start-btn">Launch 🚀</button>
        </div>
    </div>

    <div id="minimap">
        <canvas id="minimap-canvas" width="160" height="120"></canvas>
    </div>

    <div id="planet-labels"></div>

    <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
    <script src="game.js"></script>
</body>
</html>
